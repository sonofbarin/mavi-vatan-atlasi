name: Veri güncelle (adalar + FIR)

on:
  workflow_dispatch:        # Actions sekmesinden elle çalıştır
  schedule:
    - cron: "0 3 1 * *"     # her ayın 1'i, 03:00 UTC

permissions:
  contents: write

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıklar
        run: pip install requests shapely

      - name: FIR sınırlarını çek (VATSpy / ICAO)
        run: python veri/cek_fir.py

      - name: Adaları çek (OpenStreetMap / Overpass)
        run: python veri/cek_adalar.py

      - name: Karasularını üret (OSM adalarından)
        run: python veri/cek_karasulari.py

      - name: Değişiklikleri işle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "değişiklik yok"
          else
            git commit -m "veri: adalar + FIR + karasuları güncellendi ($(date -u +%Y-%m-%d))"
            # Koşu sırasında depoya başka commit düşmüş olabilir → önce çek, üstüne bindir
            git pull --rebase origin main
            git push
          fi
